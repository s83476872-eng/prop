<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 GPS Controller - OpenStreetMap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(45deg, #2196F3, #21CBF3);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #2196F3;
            padding-bottom: 10px;
        }
        #map { height: 400px; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: #555; }
        input, select {
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: #2196F3;
            box-shadow: 0 0 0 3px rgba(33,150,243,0.1);
        }
        .send-btn {
            background: linear-gradient(45deg, #2196F3, #21CBF3);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(33,150,243,0.4);
        }
        .serial-output {
            background: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            white-space: pre-wrap;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .coords-display {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .content { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ESP32 GPS Controller</h1>
            <p>Send GPS coordinates to ESP32 Serial Monitor (No API Key Needed!)</p>
        </div>
        <div class="content">
            <div class="panel">
                <h2>📍 OpenStreetMap</h2>
                <div id="map"></div>
                <div id="coords-display" class="coords-display">Click map to get coordinates</div>
            </div>
            <div class="panel">
                <h2>⚙️ ESP32 Controls</h2>
                <div class="input-group">
                    <label>Latitude:</label>
                    <input type="number" id="lat" step="any" placeholder="28.6139" value="28.6139">
                </div>
                <div class="input-group">
                    <label>Longitude:</label>
                    <input type="number" id="lng" step="any" placeholder="77.2090" value="77.2090">
                </div>
                <div class="input-group">
                    <label>Command:</label>
                    <select id="command">
                        <option value="GPS_SET">Set GPS Position</option>
                        <option value="GPS_CLEAR">Clear GPS</option>
                        <option value="STATUS">Get Status</option>
                    </select>
                </div>
                <button class="send-btn" onclick="sendToESP32()">🚀 Send to ESP32</button>
                <div id="status"></div>
                <div class="input-group">
                    <label>📡 Serial Monitor (Copy & Paste):</label>
                    <div id="serial-output" class="serial-output">
                        ESP32 GPS Controller Ready!
                        ↓ Click Send to copy command
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        const defaultLat = 28.6139; // Delhi
        const defaultLng = 77.2090;

        // Initialize OpenStreetMap
        map = L.map('map').setView([defaultLat, defaultLng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        marker = L.marker([defaultLat, defaultLng]).addTo(map)
            .bindPopup('ESP32 GPS Position');

        // Click to get coordinates
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(6);
            const lng = e.latlng.lng.toFixed(6);
            updateMarker(lat, lng);
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
        });

        function updateMarker(lat, lng) {
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], 15);
            document.getElementById('coords-display').textContent = 
                `Lat: ${lat}, Lng: ${lng}`;
        }

        function sendToESP32() {
            const lat = parseFloat(document.getElementById('lat').value) || 0;
            const lng = parseFloat(document.getElementById('lng').value) || 0;
            const command = document.getElementById('command').value;
            const serialCommand = `${command},${lat.toFixed(6)},${lng.toFixed(6)}\n`;
            
            navigator.clipboard.writeText(serialCommand).then(() => {
                showStatus('✅ COPIED! Paste into Arduino Serial Monitor (115200 baud)', 'success');
                simulateSerialOutput(serialCommand);
                updateMarker(lat, lng);
            });
        }

        function simulateSerialOutput(cmd) {
            const output = document.getElementById('serial-output');
            const time = new Date().toLocaleTimeString();
            output.textContent += `\n[${time}] 📤 COPY: ${cmd}`;
            output.scrollTop = output.scrollHeight;
        }

        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${msg}</div>`;
            setTimeout(() => document.getElementById('status').innerHTML = '', 4000);
        }

        document.addEventListener('keypress', e => e.key === 'Enter' && sendToESP32());
    </script>
</body>
</html>
